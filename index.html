<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <title>La Tribu Mostra · Carta</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css?v=27">
</head>
<body>

  <!-- Floating search toggle -->
  <button id="search-toggle" class="search-toggle" aria-label="Buscar en el menú">🔍</button>

  <!-- Header -->
  <header class="menu-header">
    <img class="header-logo" src="assets/logo.png" alt="La Tribu Mostra">

    <!-- Gatito decorativo -->
    <div class="header-cat-wrap">
      <svg class="header-cat" viewBox="0 0 160 195" xmlns="http://www.w3.org/2000/svg">
        <!-- Cola (detrás del cuerpo) -->
        <g transform="translate(122,148)">
          <g class="cat-tail">
            <path d="M0,0 C28,-6 44,-36 24,-64"
                  fill="none" stroke="#e8e8e8" stroke-width="13" stroke-linecap="round"/>
          </g>
        </g>
        <!-- Cuerpo -->
        <ellipse cx="75" cy="145" rx="52" ry="46" fill="white"/>
        <!-- Mancha negra cuerpo -->
        <ellipse cx="50" cy="132" rx="27" ry="34" fill="#1a1a1a"/>
        <!-- Cabeza -->
        <circle cx="78" cy="82" r="36" fill="white"/>
        <!-- Mancha negra cabeza -->
        <ellipse cx="61" cy="74" rx="19" ry="25" fill="#1a1a1a" transform="rotate(-8,61,74)"/>
        <!-- Oreja izquierda -->
        <polygon points="44,52 35,24 60,46" fill="white"/>
        <polygon points="44,50 39,28 57,44" fill="#f9a8b8"/>
        <!-- Oreja derecha -->
        <polygon points="97,48 113,22 118,50" fill="white"/>
        <polygon points="99,48 113,26 116,49" fill="#f9a8b8"/>
        <!-- Ojo izquierdo (dorado, sobre mancha) -->
        <circle cx="63" cy="78" r="9" fill="#8b7520"/>
        <circle cx="63" cy="78" r="5" fill="#111"/>
        <circle cx="65" cy="76" r="2" fill="white"/>
        <!-- Ojo derecho (verde) -->
        <circle cx="94" cy="78" r="9" fill="#3a8a3a"/>
        <circle cx="94" cy="78" r="5" fill="#111"/>
        <circle cx="96" cy="76" r="2" fill="white"/>
        <!-- Nariz -->
        <ellipse cx="78" cy="91" rx="4" ry="3" fill="#f47070"/>
        <!-- Boca -->
        <path d="M74,95 Q78,99 82,95" stroke="#d45050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Bigotes izquierda -->
        <line x1="22" y1="88" x2="66" y2="91" stroke="rgba(210,210,210,0.7)" stroke-width="1.2"/>
        <line x1="20" y1="94" x2="65" y2="94" stroke="rgba(210,210,210,0.7)" stroke-width="1.2"/>
        <!-- Bigotes derecha -->
        <line x1="91" y1="91" x2="132" y2="88" stroke="rgba(210,210,210,0.7)" stroke-width="1.2"/>
        <line x1="92" y1="94" x2="134" y2="94" stroke="rgba(210,210,210,0.7)" stroke-width="1.2"/>
        <!-- Patitas -->
        <ellipse cx="54" cy="186" rx="22" ry="9" fill="white"/>
        <ellipse cx="98" cy="186" rx="22" ry="9" fill="white"/>
      </svg>
    </div>
  </header>

  <!-- Search bar (hidden by default, sticky) -->
  <div id="search-bar" class="search-bar" aria-hidden="true">
    <div class="search-inner">
      <input id="search-input" type="text" class="search-input"
             placeholder="Buscar en el menú…" autocomplete="off" spellcheck="false">
      <button id="search-close" class="search-close" aria-label="Cerrar buscador">✕</button>
    </div>
    <p id="search-empty" class="search-empty" style="display:none">No se encuentra</p>
  </div>

  <!-- Loading state -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <span>Cargando carta…</span>
  </div>

  <!-- Menu content -->
  <main id="content" style="display:none">

    <!-- PROMOCIONES (oculto si no hay promos activas) -->
    <div class="category-block" id="promociones-block" style="display:none">
      <div class="category-heading">
        <h2 class="cat-title">Promos</h2>
      </div>
      <div id="promociones-content"></div>
    </div>

    <!-- BEBIDAS -->
    <div class="category-block">
      <div class="category-heading">
        <h2 class="cat-title">Bebidas</h2>
      </div>
      <div id="bebidas-content"></div>
    </div>

    <!-- COMIDA -->
    <div class="category-block">
      <div class="category-heading">
        <h2 class="cat-title">Comida</h2>
        <p class="comida-legend">
          <span class="legend-item"><span class="vegan-badge" style="display:inline-block">🌱</span> también hay opción vegana</span>
          <span class="legend-sep">·</span>
          <span class="legend-item"><img class="sin-tacc-badge" src="assets/sintacc.png" alt="Sin TACC"> sin TACC</span>
        </p>
      </div>
      <div id="comida-content"></div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-address">Lambaré 873</span>
      <div class="footer-cat-wrap">
        <svg class="footer-cat" viewBox="0 0 160 195" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(122,148)">
            <g class="cat-tail">
              <path d="M0,0 C28,-6 44,-36 24,-64"
                    fill="none" stroke="#e8e8e8" stroke-width="13" stroke-linecap="round"/>
            </g>
          </g>
          <ellipse cx="75" cy="145" rx="52" ry="46" fill="white"/>
          <ellipse cx="50" cy="132" rx="27" ry="34" fill="#1a1a1a"/>
          <circle cx="78" cy="82" r="36" fill="white"/>
          <ellipse cx="61" cy="74" rx="19" ry="25" fill="#1a1a1a" transform="rotate(-8,61,74)"/>
          <polygon points="44,52 35,24 60,46" fill="white"/>
          <polygon points="44,50 39,28 57,44" fill="#f9a8b8"/>
          <polygon points="97,48 113,22 118,50" fill="white"/>
          <polygon points="99,48 113,26 116,49" fill="#f9a8b8"/>
          <circle cx="63" cy="78" r="9" fill="#8b7520"/>
          <circle cx="63" cy="78" r="5" fill="#111"/>
          <circle cx="65" cy="76" r="2" fill="white"/>
          <circle cx="94" cy="78" r="9" fill="#3a8a3a"/>
          <circle cx="94" cy="78" r="5" fill="#111"/>
          <circle cx="96" cy="76" r="2" fill="white"/>
          <ellipse cx="78" cy="91" rx="4" ry="3" fill="#f47070"/>
          <path d="M74,95 Q78,99 82,95" stroke="#d45050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <line x1="22" y1="88" x2="66" y2="91" stroke="rgba(210,210,210,0.7)" stroke-width="1.2"/>
          <line x1="20" y1="94" x2="65" y2="94" stroke="rgba(210,210,210,0.7)" stroke-width="1.2"/>
          <line x1="91" y1="91" x2="132" y2="88" stroke="rgba(210,210,210,0.7)" stroke-width="1.2"/>
          <line x1="92" y1="94" x2="134" y2="94" stroke="rgba(210,210,210,0.7)" stroke-width="1.2"/>
          <ellipse cx="54" cy="186" rx="22" ry="9" fill="white"/>
          <ellipse cx="98" cy="186" rx="22" ry="9" fill="white"/>
        </svg>
      </div>
      <span class="footer-address">Lambaré 873</span>
    </div>
  </footer>

  <!-- Toast notification (for errors only, not shown in guest mode) -->
  <div id="toast" class="toast"></div>

  <script type="module" src="js/menu.js?v=6"></script>
</body>
</html>
