<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Admin · La Tribu Mostra</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css?v=31">
</head>
<body>

  <!-- ── Login screen ──────────────────────────────────────── -->
  <div id="login-wrap" class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <img
          src="assets/logo.png"
          alt="Logo"
          onerror="this.style.display='none'; document.getElementById('login-logo-fb').style.display='inline-flex';"
        >
        <span id="login-logo-fb" class="logo-fallback" style="display:none">🌈</span>
      </div>

      <h2 class="login-title">Panel Admin</h2>
      <p class="login-sub">La Tribu Mostra</p>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="login-password">Contraseña</label>
          <div class="password-wrap">
            <input
              id="login-password"
              type="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
            <button type="button" id="toggle-password" class="btn-show-pass" aria-label="Mostrar contraseña">👁</button>
          </div>
        </div>
        <p id="login-error" class="error-msg"></p>
        <button id="login-btn" type="submit" class="btn btn-primary">Entrar</button>
      </form>

    </div>
  </div>

  <!-- ── Admin panel ───────────────────────────────────────── -->
  <div id="admin-wrap" class="admin-wrap">

    <!-- Sticky header -->
    <header class="admin-header">
      <button id="logout-btn" class="btn-logout-sm" title="Salir">← Salir</button>
      <div class="admin-header-center">
        <img src="assets/logo.png" class="admin-logo-sm" alt="Mostra"
             onerror="this.style.display='none'">
        <span class="admin-badge">ADMIN</span>
      </div>
      <div class="admin-header-right">
        <input id="admin-search" type="search" class="admin-search-input"
               placeholder="🔍 Buscar…" autocomplete="off">
      </div>
    </header>

    <!-- Filters -->
    <div class="admin-filters">
      <select id="filter-section" class="filter-pill">
        <option value="">Todas las secciones</option>
      </select>
      <select id="filter-available" class="filter-pill">
        <option value="all">Todos</option>
        <option value="available">Disponibles</option>
        <option value="unavailable">No disponibles</option>
      </select>
    </div>

    <!-- Add item button -->
    <div class="admin-actions">
      <button id="add-item-btn" class="btn-add-item">
        <span style="font-size:1.1rem">＋</span>
        Agregar ítem
      </button>
    </div>

    <!-- Promo sections management -->
    <div class="promo-mgmt">
      <button id="promo-mgmt-toggle" class="promo-mgmt-toggle">
        🏷️ Secciones de promo <span id="promo-mgmt-arrow">▾</span>
      </button>
      <div id="promo-mgmt-body" class="promo-mgmt-body hidden">
        <form id="add-promo-section-form" class="promo-add-form">
          <input id="promo-section-name" type="text" class="form-input"
                 placeholder="Título (ej: 2 tragos + tostón)" required>
          <input id="promo-section-desc" type="text" class="form-input"
                 placeholder="Descripción (opcional)">
          <input id="promo-section-price" type="number" class="form-input"
                 placeholder="Precio ($)" min="0">
          <input id="promo-section-bebida" type="text" class="form-input"
                 placeholder="Bebida incluida (opcional)">
          <input id="promo-section-comida" type="text" class="form-input"
                 placeholder="Comida incluida (opcional)">
          <button type="submit" class="btn btn-primary">＋ Crear promo</button>
        </form>
        <div id="promo-sections-list" class="promo-sections-list"></div>
      </div>
    </div>

    <!-- Items list -->
    <div id="admin-list" class="admin-list">
      <div class="loading">
        <div class="spinner"></div>
        <span>Cargando…</span>
      </div>
    </div>

  </div>

  <!-- ── Add item modal ────────────────────────────────────── -->
  <div id="add-item-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h3 class="modal-title" id="modal-title">Agregar Ítem</h3>

      <form id="add-item-form" autocomplete="off">

        <div class="form-group">
          <label class="form-label" for="new-section">Sección *</label>
          <select id="new-section" class="form-select" required>
            <!-- populated by JS -->
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="new-name">Nombre *</label>
          <input
            id="new-name"
            type="text"
            class="form-input"
            placeholder="ej: Fernet Branca"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="new-subsection">
            Subsección <span style="color:#555;font-weight:400">(opcional)</span>
          </label>
          <input
            id="new-subsection"
            type="text"
            class="form-input"
            placeholder="ej: Rubias, IPA, Empanadas…"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="new-description">
            Descripción <span style="color:#555;font-weight:400">(opcional)</span>
          </label>
          <input
            id="new-description"
            type="text"
            class="form-input"
            placeholder="ej: Con ensalada, Vegana…"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="new-price">Precio ($)</label>
          <input
            id="new-price"
            type="number"
            class="form-input"
            placeholder="0"
            min="0"
          >
        </div>

        <div class="modal-actions">
          <button type="button" id="close-modal-btn" class="btn btn-ghost">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="width:auto;flex:1">Agregar</button>
        </div>

      </form>
    </div>
  </div>

  <!-- ── Edit item modal ────────────────────────────────── -->
  <div id="edit-item-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="edit-item-modal-title">
    <div class="modal">
      <h3 class="modal-title" id="edit-item-modal-title">Editar Ítem</h3>

      <form id="edit-item-form" autocomplete="off">

        <div class="form-group">
          <label class="form-label" for="edit-item-name">Nombre *</label>
          <input id="edit-item-name" type="text" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="edit-item-subsection">
            Subsección <span style="color:#555;font-weight:400">(opcional)</span>
          </label>
          <input id="edit-item-subsection" type="text" class="form-input"
                 placeholder="ej: Rubias, IPA, Empanadas…">
        </div>

        <div class="form-group">
          <label class="form-label" for="edit-item-description">
            Descripción <span style="color:#555;font-weight:400">(opcional)</span>
          </label>
          <input id="edit-item-description" type="text" class="form-input"
                 placeholder="ej: Con ensalada, Vegana…">
        </div>

        <div class="modal-actions">
          <button type="button" id="close-edit-item-btn" class="btn btn-ghost">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="width:auto;flex:1">Guardar</button>
        </div>

      </form>
    </div>
  </div>

  <!-- ── Edit promo modal ───────────────────────────────── -->
  <div id="edit-promo-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="edit-promo-modal-title">
    <div class="modal">
      <h3 class="modal-title" id="edit-promo-modal-title">Editar Promo</h3>

      <form id="edit-promo-form" autocomplete="off">

        <div class="form-group">
          <label class="form-label" for="edit-promo-name">Título *</label>
          <input id="edit-promo-name" type="text" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="edit-promo-desc">
            Descripción <span style="color:#555;font-weight:400">(opcional)</span>
          </label>
          <textarea id="edit-promo-desc" class="form-input" rows="3"
                    placeholder="Descripción detallada de la promo…"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="edit-promo-price">Precio ($)</label>
          <input id="edit-promo-price" type="number" class="form-input" min="0" placeholder="0">
        </div>

        <div class="form-group">
          <label class="form-label" for="edit-promo-bebida">
            Bebida <span style="color:#555;font-weight:400">(opcional)</span>
          </label>
          <input id="edit-promo-bebida" type="text" class="form-input"
                 placeholder="ej: 2 tragos a elección">
        </div>

        <div class="form-group">
          <label class="form-label" for="edit-promo-comida">
            Comida <span style="color:#555;font-weight:400">(opcional)</span>
          </label>
          <input id="edit-promo-comida" type="text" class="form-input"
                 placeholder="ej: 1 tostón a elección">
        </div>

        <div class="modal-actions">
          <button type="button" id="close-edit-promo-btn" class="btn btn-ghost">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="width:auto;flex:1">Guardar</button>
        </div>

      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script type="module" src="js/admin.js?v=7"></script>
</body>
</html>
